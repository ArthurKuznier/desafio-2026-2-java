spring.application.name=gestao-documentos

# ---- Banco de dados (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gestao_documentos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
app.security.jwt.secret=${JWT_SECRET:8BMLF1HbCdU1HhOvidsdOxDkB2qSwq7a}
app.security.jwt.access-token-expiration-ms=${JWT_ACCESS_EXP:900000}
app.security.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXP:604800000}

# ---- Usuario admin inicial (seed) ----
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:admin123}

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.error.include-message=always